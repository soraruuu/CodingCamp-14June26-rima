<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <div class="dashboard-container">
        
        <div class="card header-card">
            <div id="clock"></div>
            <div id="date"></div>
            <div id="greeting"></div>
        </div>

        <div class="card timer-card">
            <div class="card-title">Focus Timer</div>
            <div id="timer-display">25:00</div>
            <div class="button-group">
                <button class="btn-primary" id="btn-start" onclick="startTimer()">Start</button>
                <button class="btn-secondary" id="btn-stop" onclick="stopTimer()">Stop</button>
                <button class="btn-secondary" id="btn-reset" onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Tasks</div>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Add a new task..." onkeypress="handleTaskKeyPress(event)">
                <button class="btn-primary" onclick="addTask()">Add</button>
            </div>
            <ul id="task-list" class="task-list"></ul>
        </div>

        <div class="card">
            <div class="card-title">Quick Links</div>
            <div class="input-group">
                <input type="text" id="link-name-input" placeholder="Link name">
                <input type="text" id="link-url-input" placeholder="URL (e.g., google.com)">
                <button class="btn-primary" onclick="addLink()">Add Link</button>
            </div>
            <div id="links-container" class="links-container"></div>
        </div>

    </div>

    <script src="./js/script.js"></script>
</body>
</html>
