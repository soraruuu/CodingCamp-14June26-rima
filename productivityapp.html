<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Background gradient ungu */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1a1a1a;
            box-sizing: border-box;
        }

        /* Container Utama Dashboard */
        .dashboard-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Kartu Panel Putih */
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        /* 1. Styling Jam Utama (DIUBAH MENJADI CENTER) */
        .header-card {
            text-align: center; /* Membuat teks jam, tanggal, sapaan berada di tengah */
        }
        #clock { 
            font-size: 54px;
            font-weight: 700; 
            font-variant-numeric: tabular-nums; 
            color: #6366f1;
            letter-spacing: -1px; 
            margin: 0 0 5px 0;
        }
        #date { 
            font-size: 16px;
            color: #666; 
            margin: 0 0 15px 0;
        }
        #greeting { 
            font-size: 24px;
            color: #222; 
            font-weight: 700;
            margin: 0;
        }

        /* Styling Judul Komponen */
        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            margin: 0 0 15px 0;
        }

        /* 2. Styling Focus Timer */
        .timer-card { text-align: center; }
        #timer-display {
            font-size: 64px;
            font-weight: 500;
            color: #6366f1;
            font-variant-numeric: tabular-nums;
            margin-bottom: 20px;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* Tombol Umum */
        button {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary { background-color: #6366f1; color: white; }
        .btn-primary:hover { background-color: #4f46e5; }
        .btn-secondary { background-color: #e5e7eb; color: #4b5563; }
        .btn-secondary:hover { background-color: #d1d5db; }
        .btn-danger { background-color: #fee2e2; color: #ef4444; font-size: 12px; padding: 6px 12px; }
        .btn-danger:hover { background-color: #fca5a5; }

        /* Styling Inputs Grup */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .input-group input {
            flex: 1;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            outline: none;
            min-width: 0;
        }
        .input-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        
        /* 3. Styling To-Do List */
        .task-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid #f3f4f6; }
        .task-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        .task-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #6366f1; }
        .task-text { font-size: 15px; color: #374151; word-break: break-all; cursor: pointer; }
        .task-text.completed { text-decoration: line-through; color: #9ca3af; }
        .edit-input { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; padding: 4px 8px; border: 1px solid #6366f1; border-radius: 4px; width: 80%; }

        /* 4. Styling Quick Links */
        .links-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .link-btn {
            display: inline-flex;
            align-items: center;
            background-color: #6366f1;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s;
            cursor: pointer;
        }
        .link-btn:hover { background-color: #4f46e5; }
        .link-delete-icon {
            margin-left: 10px;
            font-size: 16px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: color 0.2s;
        }
        .link-delete-icon:hover { color: #fee2e2; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="card header-card">
            <div id="clock"></div>
            <div id="date"></div>
            <div id="greeting"></div>
        </div>

        <div class="card timer-card">
            <div class="card-title">Focus Timer</div>
            <div id="timer-display">25:00</div>
            <div class="button-group">
                <button class="btn-primary" id="btn-start" onclick="startTimer()">Start</button>
                <button class="btn-secondary" id="btn-stop" onclick="stopTimer()">Stop</button>
                <button class="btn-secondary" id="btn-reset" onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Tasks</div>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Add a new task..." onkeypress="handleTaskKeyPress(event)">
                <button class="btn-primary" onclick="addTask()">Add</button>
            </div>
            <ul id="task-list" class="task-list"></ul>
        </div>

        <div class="card">
            <div class="card-title">Quick Links</div>
            <div class="input-group">
                <input type="text" id="link-name-input" placeholder="Link name">
                <input type="text" id="link-url-input" placeholder="URL (e.g., google.com)">
                <button class="btn-primary" onclick="addLink()">Add Link</button>
            </div>
            <div id="links-container" class="links-container"></div>
        </div>

    </div>

    <script>
        // === 1. LOGIKA JAM REAL-TIME ===
        function updateDashboard() {
            let now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerHTML = `${hours}:${minutes}:${seconds}`;

            let options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerHTML = now.toLocaleDateString('en-US', options);

            let greeting = "";
            let h = now.getHours();
            if (h >= 5 && h < 12) greeting = "Good morning";
            else if (h >= 12 && h < 18) greeting = "Good afternoon";
            else greeting = "Good evening";
            document.getElementById('greeting').innerHTML = greeting + "!";
        }
        setInterval(updateDashboard, 1000);
        updateDashboard();


        // === 2. LOGIKA FOCUS TIMER ===
        let timer;
        let timeLeft = 25 * 60; 
        let isRunning = false;

        function updateTimerDisplay() {
            let minutes = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            let seconds = String(timeLeft % 60).padStart(2, '0');
            document.getElementById('timer-display').innerHTML = `${minutes}:${seconds}`;
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timer);
                    isRunning = false;
                    alert("Focus time is over! Take a short break.");
                    resetTimer();
                }
            }, 1000);
        }

        function stopTimer() { clearInterval(timer); isRunning = false; }
        function resetTimer() { clearInterval(timer); isRunning = false; timeLeft = 25 * 60; updateTimerDisplay(); }


        // === 3. LOGIKA TO-DO LIST (TASKS & LOCAL STORAGE) ===
        let tasks = JSON.parse(localStorage.getItem('productivity_tasks')) || [];

        function renderTasks() {
            const taskListElement = document.getElementById('task-list');
            taskListElement.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item';
                li.innerHTML = `
                    <div class="task-left">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleTask(${index})">
                        <span class="task-text ${task.completed ? 'completed' : ''}" id="task-text-${index}">${task.text}</span>
                    </div>
                    <button class="btn-danger" onclick="deleteTask(${index})">Delete</button>
                `;
                taskListElement.appendChild(li);
                document.getElementById(`task-text-${index}`).addEventListener('dblclick', () => editTask(index));
            });
            localStorage.setItem('productivity_tasks', JSON.stringify(tasks));
        }

        function addTask() {
            const input = document.getElementById('task-input');
            if (input.value.trim() === '') return;
            tasks.push({ text: input.value.trim(), completed: false });
            input.value = '';
            renderTasks();
        }

        function handleTaskKeyPress(event) { if (event.key === 'Enter') addTask(); }
        function toggleTask(index) { tasks[index].completed = !tasks[index].completed; renderTasks(); }
        
        function editTask(index) {
            const textSpan = document.getElementById(`task-text-${index}`);
            const inputEdit = document.createElement('input');
            inputEdit.type = 'text';
            inputEdit.className = 'edit-input';
            inputEdit.value = tasks[index].text;
            textSpan.replaceWith(inputEdit);
            inputEdit.focus();

            function saveEdit() {
                if (inputEdit.value.trim() !== '') tasks[index].text = inputEdit.value.trim();
                renderTasks();
            }
            inputEdit.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveEdit(); });
            inputEdit.addEventListener('blur', saveEdit);
        }

        function deleteTask(index) { tasks.splice(index, 1); renderTasks(); }
        renderTasks();


        // === 4. LOGIKA QUICK LINKS (LOCAL STORAGE) ===
        let quickLinks = JSON.parse(localStorage.getItem('productivity_links')) || [
            { name: 'Google', url: 'https://google.com' },
            { name: 'Gmail', url: 'https://mail.google.com' },
            { name: 'Calendar', url: 'https://calendar.google.com' }
        ];

        function renderLinks() {
            const container = document.getElementById('links-container');
            container.innerHTML = '';
            quickLinks.forEach((link, index) => {
                const linkButton = document.createElement('div');
                linkButton.className = 'link-btn';
                linkButton.setAttribute('onclick', `window.open('${link.url}', '_blank')`);
                linkButton.innerHTML = `
                    ${link.name}
                    <span class="link-delete-icon" onclick="deleteLink(event, ${index})">×</span>
                `;
                container.appendChild(linkButton);
            });
            localStorage.setItem('productivity_links', JSON.stringify(quickLinks));
        }

        function addLink() {
            const nameInput = document.getElementById('link-name-input');
            const urlInput = document.getElementById('link-url-input');
            let name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if (name === '' || url === '') return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            quickLinks.push({ name: name, url: url });
            nameInput.value = '';
            urlInput.value = '';
            renderLinks();
        }

        function deleteLink(event, index) {
            event.stopPropagation();
            quickLinks.splice(index, 1);
            renderLinks();
        }

        renderLinks();
    </script>
</body>
</html>
